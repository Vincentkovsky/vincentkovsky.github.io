<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vincent Jin | Developer Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2D3748;
      --accent: #48BB78;
      --dark: #1A202C;
      --light: #E2E8F0;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--dark);
      color: var(--light);
    }
    
    h1, h2, h3, h4 {
      font-family: 'JetBrains Mono', monospace;
    }
    
    .neumorphic-card {
      background: var(--primary);
      box-shadow: 8px 8px 16px #1a202c, -8px -8px 16px #4a5568;
      border-radius: 1rem;
      transition: transform 0.1s ease-in-out, box-shadow 0.1s ease-in-out;
      overflow: hidden;
    }
    
    .neumorphic-card:hover {
      transform: translateY(-4px);
    }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      background: #2D3748;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #48BB78;
      border-radius: 4px;
    }
    
    /* Skill tag styling */
    .skill-tag {
      background: var(--primary);
      color: var(--accent);
      border-radius: 9999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.875rem;
      display: inline-block;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    
    .skill-tag::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        45deg,
        rgba(72, 187, 120, 0.1),
        rgba(72, 187, 120, 0.1) 5px,
        rgba(72, 187, 120, 0.2) 5px,
        rgba(72, 187, 120, 0.2) 10px
      );
      animation: flow 2s linear infinite;
    }
    
    @keyframes flow {
      0% {
        left: -100%;
      }
      100% {
        left: 100%;
      }
    }
    
    /* Skill bar styling */
    .skill-bar {
      margin-bottom: 1rem;
    }
    
    .skill-bar .label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
    }
    
    .skill-bar .progress {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .skill-bar .progress .fill {
      height: 100%;
      background: var(--accent);
      position: relative;
    }
    
    .skill-bar .progress .fill .glow {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: 5px;
      background: rgba(255, 255, 255, 0.7);
      filter: blur(3px);
    }
    
    /* Responsive styling */
    @media (max-width: 768px) {
      #main-grid {
        grid-template-columns: 1fr !important;
      }
      
      .neumorphic-card {
        box-shadow: 4px 4px 8px #1a202c, -4px -4px 8px #4a5568;
      }
    }

    /* Focus states */
    a:focus, button:focus {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    
    /* Iframe styling */
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* 骨架屏动画 */
    .skeletal-loading {
      animation: skeleton-loading 1.5s ease infinite;
      background: linear-gradient(90deg, 
        rgba(45, 55, 72, 0.7), 
        rgba(45, 55, 72, 0.9), 
        rgba(45, 55, 72, 0.7));
      background-size: 200% 100%;
    }
    
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="bg-[#1A202C] min-h-screen p-4 md:p-12">
  <header class="max-w-7xl mx-auto mb-8">
    <div class="flex justify-between items-center">

        <div class="skeletal-loading w-full h-4 rounded mb-3"></div>

    <!-- SkillRadar -->
    <div id="skills" class="neumorphic-card">

        <div class="flex flex-wrap gap-2 mb-6">

        <div class="space-y-4">
          <div class="w-full">
            <div class="flex justify-between mb-1">

          <div class="w-full">
            <div class="flex justify-between mb-1">

        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="grid grid-cols-3 gap-3 mb-4">

  <footer class="mt-12 mb-6 text-center text-gray-400 text-sm max-w-7xl mx-auto">

  <script>
    // 等待页面加载完成
    document.addEventListener('DOMContentLoaded', function() {
      // 为每个iframe调整高度的函数
      function resizeIframe(iframe) {
        try {
          // 获取iframe中的内容高度
          const height = iframe.contentWindow.document.body.scrollHeight;
          // 设置iframe的高度
          iframe.style.height = height + 'px';
        } catch (e) {
          console.error('Error resizing iframe:', e);
        }
      }

      // 获取所有iframe元素和骨架屏元素
      const iframes = document.querySelectorAll('iframe');
      const preRenders = document.querySelectorAll('.pre-render');
      
      // 优化iframe加载顺序和性能
      function loadIframe(iframe, preRender, delay = 0) {
        setTimeout(() => {
          // 设置iframe的src属性，触发加载
          if(iframe.dataset.src) {
            iframe.src = iframe.dataset.src;
          }
          
          // 当iframe加载完成时调整高度并隐藏骨架屏
          iframe.onload = function() {
            // 显示iframe
            iframe.style.display = 'block';
            
            // 隐藏骨架屏
            if (preRender) {
              preRender.style.display = 'none';
            }
            
            // 调整iframe高度
            resizeIframe(iframe);
            
            // 通知父窗口已加载完成
            window.dispatchEvent(new Event('iframe-loaded'));
          };
        }, delay);
      }
      
      // 检测元素是否在视口中
      function isInViewport(element) {
        const rect = element.getBoundingClientRect();
        return (
          rect.top >= -300 && // 稍微扩大检测范围，提前加载
          rect.left >= 0 &&
          rect.bottom <= (window.innerHeight + 300) && // 稍微扩大检测范围，提前加载
          rect.right <= (window.innerWidth || document.documentElement.clientWidth)
        );
      }
      
      // 创建交叉观察器
      if ('IntersectionObserver' in window) {
        const options = {
          root: null, // 使用视口作为根元素
          rootMargin: '300px 0px', // 扩大检测范围，提前加载
          threshold: 0.1
        };
        
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const cardContainer = entry.target;
              const iframe = cardContainer.querySelector('iframe');
              const preRender = cardContainer.querySelector('.pre-render');
              
              if (iframe && iframe.dataset.src && !iframe.src) {
                loadIframe(iframe, preRender);
              }
              
              // 已加载的iframe不再需要观察
              observer.unobserve(cardContainer);
            }
          });
        }, options);
        
        // 对每个卡片容器进行观察，而不是单独的iframe
        document.querySelectorAll('.neumorphic-card').forEach(card => {
          observer.observe(card);
        });
        
        // 立即加载首屏可见的iframe
        document.querySelectorAll('.neumorphic-card').forEach(card => {
          if (isInViewport(card)) {
            const iframe = card.querySelector('iframe');
            const preRender = card.querySelector('.pre-render');
            
            if (iframe && iframe.dataset.src && !iframe.src) {
              // 优先加载首屏内容
              loadIframe(iframe, preRender, 0);
            }
            
            // 已处理的卡片不再需要观察
            observer.unobserve(card);
          }
        });
      } else {
        // 回退方案：为不支持IntersectionObserver的浏览器逐步加载iframe
        document.querySelectorAll('.neumorphic-card').forEach((card, index) => {
          const iframe = card.querySelector('iframe');
          const preRender = card.querySelector('.pre-render');
          
          if (iframe && iframe.dataset.src) {
            loadIframe(iframe, preRender, index * 200); // 每个iframe延迟200ms加载
          }
        });
      }
      
      // 窗口大小改变时重新调整所有iframe
      window.addEventListener('resize', function() {
        iframes.forEach(iframe => {
          if (iframe.contentWindow && iframe.style.display !== 'none') {
            resizeIframe(iframe);
          }
        });
      });
      
      // 当任何iframe内容发生变化时，重新调整大小
      window.addEventListener('iframe-loaded', function() {
        iframes.forEach(iframe => {
          if (iframe.contentWindow && iframe.style.display !== 'none') {
            resizeIframe(iframe);
          }
        });
      });
      
      // 添加记录页面加载性能的代码
      if (window.performance) {
        // 获取性能指标
        window.addEventListener('load', function() {
          setTimeout(function() {
            const perfData = window.performance.timing;
            const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
            const domReadyTime = perfData.domComplete - perfData.domLoading;
            
            console.log('页面加载总时间:', pageLoadTime + 'ms');
            console.log('DOM处理时间:', domReadyTime + 'ms');
          }, 0);
        });
      }
    });
  </script>
</body>
</html>
