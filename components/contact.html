<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Component</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2D3748;
      --accent: #48BB78;
      --dark: #1A202C;
      --light: #E2E8F0;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: transparent;
      color: var(--light);
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    h1, h2, h3, h4 {
      font-family: 'JetBrains Mono', monospace;
    }
    
    input, textarea {
      background-color: var(--dark);
      border: 1px solid #4A5568;
      color: var(--light);
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      width: 100%;
      transition: border-color 0.15s ease-in-out;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.1);
    }
    
    button {
      background-color: var(--accent);
      color: white;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      width: 100%;
      transition: background-color 0.15s ease-in-out;
    }
    
    button:hover {
      background-color: #38A169;
    }
    
    button:focus {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    
    a:focus {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    
    .contact-link {
      display: flex;
      align-items: center;
      color: rgba(226, 232, 240, 0.8);
      text-decoration: none;
      transition: color 0.15s ease-in-out;
      margin-bottom: 0.75rem;
    }
    
    .contact-link:hover {
      color: var(--accent);
    }
    
    .contact-link i {
      margin-right: 0.5rem;
    }
  </style>
  <script>
    // 当文档加载完成后通知父窗口调整iframe高度
    window.addEventListener('load', function() {
      if (window.parent) {
        // 延迟一点时间确保所有内容已经渲染
        setTimeout(function() {
          // 触发父窗口中的resize事件来调整iframe高度
          window.parent.dispatchEvent(new Event('resize'));
        }, 100);

      }
    });
  </script>
</head>
<body>
  <div class="rounded-2xl p-6 md:p-8">
    <h2 class="text-xl font-bold mb-6 flex items-center">
      <i class="ph-bold ph-envelope mr-2"></i>
      Get In Touch
    </h2>
    <form class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium mb-1">Name</label>
        <input type="text" id="name" required>
      </div>
      <div>
        <label for="email" class="block text-sm font-medium mb-1">Email</label>
        <input type="email" id="email" required>
      </div>
      <div>
        <label for="message" class="block text-sm font-medium mb-1">Message</label>
        <textarea id="message" rows="4" required></textarea>
      </div>
      <button type="submit">
        Send Message
      </button>
    </form>
    <div class="mt-6 pt-6 border-t border-gray-700">
      <h3 class="font-bold mb-3">Or reach me via:</h3>
      <div class="space-y-3">
        <a href="mailto:contact@example.com" class="contact-link">
          <i class="ph-bold ph-envelope-simple"></i>
          contact@example.com
        </a>
        <a href="tel:+1234567890" class="contact-link">
          <i class="ph-bold ph-phone"></i>
          (123) 456-7890
        </a>
        <a href="#" class="contact-link">
          <i class="ph-bold ph-map-pin"></i>
          San Francisco, CA
        </a>
      </div>
    </div>
  </div>
</body>
</html>
